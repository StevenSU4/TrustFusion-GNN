# config/config.yaml
# Raspberry Pi gateway config file

# MQTT configuration
mqtt:
  broker: "localhost"         # MQTT broker address
  port: 1883                  # MQTT port
  username: ""                # username (if required)
  password: ""                # password (if required)
  topics:
    sensor_data: "farm/sensors"
    control: "farm/control/#"
    status: "farm/status/#"

# Cloud configuration
cloud:
  enabled: true
  api_url: "http://your-cloud-server.com/api"   # Cloud API endpoint
  api_key: "your-api-key"                        # API key
  upload_interval: 30                            # upload interval (s)

# Data-processing configuration
processing:
  window_size: 20             # time-window size (number of points)
  anomaly_threshold: 3.0      # anomaly threshold (std multiplier)

# Local-storage configuration
storage:
  database_path: "data/sensor_data.db"
  max_records: 100000         # max records (older records deleted after overflow)
  backup_interval: 3600       # backup interval (s)

# Logging configuration
logging:
  level: "INFO"               # log level: DEBUG, INFO, WARNING, ERROR
  file: "logs/gateway.log"
  max_size: 10485760          # max log file size (10MB)
  backup_count: 5             # number of retained log files